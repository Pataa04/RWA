<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Patrik Lovrić">
    <meta name="description" content="OBRT SUNCE WEB">
    <meta name="keywords" content="obrt, projekt, sunce">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrt Sunce</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body{
            width: 100%;
            height: 100%;
        }

        .container{
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 100px 1fr;
            background-color: #3d5a80;
        }

        .logo{
            background-color: #98c1d9;
            border: 2px solid white;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img{
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header{
            background-color: #98c1d9;
            border: 2px solid white;
            padding: 25px;
        }

        .header-box{
            display: inline-block;
            background-color: #ee6c4d;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
        }

        .nav{
            background-color: #98c1d9;
            border: 2px solid white;
            padding: 20px;
        }

        .nav h2{
            margin-bottom: 20px;
        }

        .nav a{
            display: block;
            text-decoration: none;
            color: black;
            margin-bottom: 10px;
        }

        .main{
            background-color: #3d5a80;
            border: 2px solid white;
            padding: 20px;
        }

        .content{
            width: 100%;
            height: 100%;
            background-color: #e0fbfc;
            border: 2px solid white;
            padding: 20px;
            overflow: auto;
        }

        h1{ margin-bottom: 10px; }
        h2{ margin-top: 10px; }
        h3{ margin-top: 10px; }

        p{
            margin-bottom: 10px;
            text-align: justify;
        }

        .content img{
            width: 200px;
            display: block;
            margin: 10px auto;
        }

        table{
            border-collapse: collapse;
            width: 100%;
            margin-top: 15px;
        }

        table, th, td{
            border: 1px solid black;
        }

        th, td{
            padding: 8px;
            text-align: center;
        }

        .autor{
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="sunce.png" alt="Logo">
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="header-box">Obrt Sunce</div>
    </div>

    <!-- NAVIGACIJA -->
    <div class="nav">
        <h2>Navigacija</h2>
        <a href="#onama">O nama</a>
        <a href="#usluge">Usluge</a>
        <a href="#kontakt">Kontakt</a>
    </div>

    <!-- SADRŽAJ -->
    <div class="main">
        <div class="content">

            <h1>Obrt Sunce</h1>

            <h2 id="onama">O nama</h2>
            <p>Obrt Sunce pruža jednostavne usluge popravaka i održavanja.</p>

            <h3 id="usluge">Usluge</h3>
            <p>Nudimo montažu, popravke i održavanje prostora.</p>

            <!-- SLIKA -->
            <img src="sunce.png" alt="Slika obrta">

            <!-- TABLICA -->
            <table>
                <tr>
                    <th>Usluga</th>
                    <th>Cijena</th>
                </tr>
                <tr>
                    <td>Montaža</td>
                    <td>20 KM</td>
                </tr>
                <tr>
                    <td>Popravak</td>
                    <td>30 KM</td>
                </tr>
            </table>

            <!-- LINK -->
            <h3>Link</h3>
            <p><a href="https://fsre.sum.ba/" target="_blank">FSRE stranica</a></p>

            <!-- AUTOR -->
            <div class="autor" id="kontakt">
                <h3>Autor</h3>
                <p>Patrik Lovrić</p>
                <p><a href="mailto:patrik.lovric9@email.com">patrik.lovric9@email.com</a></p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
